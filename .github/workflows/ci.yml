name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install fintools
        run: pip install --no-compile -e .

      - name: Install PyBondLab
        run: cd packages/PyBondLab && pip install --no-compile -e ".[performance]"

      - name: Run release preflight
        run: python tools/release_preflight.py --strict

      - name: Run onboarding smoke test
        run: python tools/onboarding_smoke_test.py

      - name: Lint with ruff
        run: pip install ruff && ruff check .

      - name: Run tests
        run: pip install pytest && pytest tests/ -v
